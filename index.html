<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Remix: ClassPulse</title>
    <script>
      // Prevent light/dark theme flicker during initial document parse
      (function() {
        try {
          const cached = localStorage.getItem('cp_accessibility');
          if (cached) {
            const parsed = JSON.parse(cached);
            if (parsed.theme === 'dark') {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
